
services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"   # HTTP UI
      - "9443:9443"   # HTTPS UI
      # - "8000:8000"   # Edge agent tunnel (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Local Docker socket
      - portainer_data:/data
    environment:
      - TZ=Asia/Kolkata

volumes:
  portainer_data:
